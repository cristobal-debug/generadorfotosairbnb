<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Tarjetas Airbnb</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --red:#FF385C; --dark:#222; --gray:#717171; --light:#F7F7F7; --border:#DDDDDD; }
body { font-family:'Plus Jakarta Sans',sans-serif; background:#f0f0ef; min-height:100vh; padding:28px 18px; color:var(--dark); }
h1 { text-align:center; font-size:1.5rem; font-weight:700; margin-bottom:5px; }
.subtitle { text-align:center; color:var(--gray); font-size:.9rem; margin-bottom:26px; }

/* ---- FORM PANEL ---- */
.form-panel { max-width:700px; margin:0 auto; background:white; border-radius:14px; padding:28px; box-shadow:0 2px 10px rgba(0,0,0,.08); }
.form-panel h2 { font-size:1rem; font-weight:700; margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.fg { margin-bottom:12px; }
.fg label { display:block; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
.fg input { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:9px 12px; font-size:.9rem; font-family:inherit; color:var(--dark); background:white; outline:none; transition:border-color .2s; }
.fg input:focus { border-color:var(--red); }
.fg-row  { display:grid; grid-template-columns:1fr 1fr;     gap:10px; }
.fg-row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.fg-row4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; }

.photos-label { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; display:block; }
.photos-grid { display:grid; grid-template-columns:2fr 1fr 1fr; grid-template-rows:90px 90px; gap:6px; margin-bottom:16px; }
.photo-slot { border:2px dashed var(--border); border-radius:8px; cursor:pointer; position:relative; overflow:hidden; background:var(--light); display:flex; align-items:center; justify-content:center; transition:border-color .2s,background .2s; }
.photo-slot:hover { border-color:var(--red); background:#fff5f6; }
.photo-slot.filled { border-style:solid; border-color:#ccc; }
.photo-slot img { width:100%; height:100%; object-fit:cover; display:block; }
.slot-lbl { font-size:.65rem; color:var(--gray); text-align:center; line-height:1.3; padding:4px; pointer-events:none; }
.slot-lbl span { display:block; font-size:1.2rem; margin-bottom:2px; }
.photo-slot.main-slot { grid-column:1; grid-row:1/3; }
.rm-btn { position:absolute; top:3px; right:3px; background:rgba(0,0,0,.55); color:white; border:none; border-radius:50%; width:20px; height:20px; font-size:11px; cursor:pointer; display:none; align-items:center; justify-content:center; z-index:2; }
.photo-slot:hover .rm-btn { display:flex; }
.photo-slot input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; z-index:1; }

.section-title { font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--gray); margin:18px 0 10px; border-top:1px solid var(--border); padding-top:14px; }

.btn-gen { width:100%; background:var(--red); color:white; border:none; border-radius:10px; padding:14px; font-size:1rem; font-weight:700; font-family:inherit; cursor:pointer; margin-top:8px; transition:background .2s,transform .1s; }
.btn-gen:hover { background:#e0284f; }
.btn-gen:active { transform:scale(.98); }
</style>
</head>
<body>

<h1>🏠 Generador de Tarjetas Airbnb</h1>
<p class="subtitle">Rellena los datos, sube las fotos y pulsa "Generar" para ver tu tarjeta</p>

<div class="form-panel">
  <h2>✏️ Datos del alojamiento</h2>

  <div class="fg"><label>Título del anuncio</label>
    <input type="text" id="f-title" value="céntrico, con aire acondicionado y piscina"></div>

  <p class="section-title">📍 Descripción</p>
  <div class="fg"><label>Tipo de alojamiento</label>
    <input type="text" id="f-type" value="Alojamiento entero: apartamento en Peñíscola, España"></div>
  <div class="fg-row3">
    <div class="fg"><label>Viajeros</label><input type="number" id="f-guests" value="6" min="1"></div>
    <div class="fg"><label>Dormitorios</label><input type="number" id="f-beds" value="3" min="1"></div>
    <div class="fg"><label>Baños</label><input type="number" id="f-baths" value="2" min="1"></div>
  </div>

  <p class="section-title">⭐ Valoración</p>
  <div class="fg-row">
    <div class="fg"><label>Puntuación (ej: 5.0)</label><input type="text" id="f-rating" value="5.0"></div>
    <div class="fg"><label>Nº Evaluaciones</label><input type="number" id="f-reviews" value="14" min="0"></div>
  </div>
  <div class="fg-row">
    <div class="fg"><label>Badge texto línea 1</label><input type="text" id="f-badge1" value="Recomendación del viajero"></div>
    <div class="fg"><label>Badge texto línea 2</label><input type="text" id="f-badge2" value="Uno de los Airbnb favoritos de los viajeros"></div>
  </div>

  <p class="section-title">👤 Anfitrión</p>
  <div class="fg-row">
    <div class="fg"><label>Nombre anfitrión</label><input type="text" id="f-host" value="Diego"></div>
    <div class="fg"><label>Experiencia</label><input type="text" id="f-hostexp" value="2 años de experiencia"></div>
  </div>

  <p class="section-title">💶 Precio y reserva</p>
  <div class="fg-row">
    <div class="fg"><label>Aviso reserva</label><input type="text" id="f-lucky" value="¡Qué suerte! Este alojamiento suele estar reservado."></div>
    <div class="fg"><label>Precio original (€)</label><input type="number" id="f-price-old" value="1354"></div>
  </div>
  <div class="fg-row">
    <div class="fg"><label>Precio final (€)</label><input type="number" id="f-price-new" value="1211"></div>
    <div class="fg"><label>Viajeros reserva</label><input type="text" id="f-guestbook" value="6 viajeros"></div>
  </div>
  <div class="fg-row">
    <div class="fg"><label>Fecha llegada</label><input type="text" id="f-checkin" value="1/8/2026"></div>
    <div class="fg"><label>Fecha salida</label><input type="text" id="f-checkout" value="8/8/2026"></div>
  </div>

  <p class="section-title">📸 Fotos</p>
  <span class="photos-label">1 foto principal + 4 secundarias</span>
  <div class="photos-grid">
    <div class="photo-slot main-slot" id="slot-0">
      <input type="file" accept="image/*" onchange="loadPhoto(0,this)">
      <div class="slot-lbl"><span>🏠</span>Principal<br><small>foto grande</small></div>
      <button class="rm-btn" onclick="removePhoto(event,0)">✕</button>
    </div>
    <div class="photo-slot" id="slot-1">
      <input type="file" accept="image/*" onchange="loadPhoto(1,this)">
      <div class="slot-lbl"><span>📷</span>Foto 2</div>
      <button class="rm-btn" onclick="removePhoto(event,1)">✕</button>
    </div>
    <div class="photo-slot" id="slot-2">
      <input type="file" accept="image/*" onchange="loadPhoto(2,this)">
      <div class="slot-lbl"><span>📷</span>Foto 3</div>
      <button class="rm-btn" onclick="removePhoto(event,2)">✕</button>
    </div>
    <div class="photo-slot" id="slot-3">
      <input type="file" accept="image/*" onchange="loadPhoto(3,this)">
      <div class="slot-lbl"><span>📷</span>Foto 4</div>
      <button class="rm-btn" onclick="removePhoto(event,3)">✕</button>
    </div>
    <div class="photo-slot" id="slot-4">
      <input type="file" accept="image/*" onchange="loadPhoto(4,this)">
      <div class="slot-lbl"><span>📷</span>Foto 5</div>
      <button class="rm-btn" onclick="removePhoto(event,4)">✕</button>
    </div>
  </div>

  <button class="btn-gen" onclick="generateCard()">🎨 Generar tarjeta en nueva ventana</button>
</div>

<script>
const photos = [null,null,null,null,null];

function loadPhoto(i, input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    photos[i] = e.target.result;
    const slot = document.getElementById('slot-'+i);
    slot.classList.add('filled');
    const old = slot.querySelector('img'); if (old) old.remove();
    const lbl = slot.querySelector('.slot-lbl'); if (lbl) lbl.style.display='none';
    const img = document.createElement('img'); img.src = e.target.result;
    slot.insertBefore(img, slot.querySelector('.rm-btn'));
  };
  reader.readAsDataURL(file);
}

function removePhoto(e, i) {
  e.stopPropagation(); photos[i]=null;
  const slot=document.getElementById('slot-'+i);
  slot.classList.remove('filled');
  const img=slot.querySelector('img'); if(img) img.remove();
  const lbl=slot.querySelector('.slot-lbl'); if(lbl) lbl.style.display='';
  const fi=slot.querySelector('input[type="file"]'); if(fi) fi.value='';
}

function generateCard() {
  const data = {
    title:     document.getElementById('f-title').value,
    type:      document.getElementById('f-type').value,
    guests:    document.getElementById('f-guests').value,
    beds:      document.getElementById('f-beds').value,
    baths:     document.getElementById('f-baths').value,
    rating:    document.getElementById('f-rating').value,
    reviews:   document.getElementById('f-reviews').value,
    badge1:    document.getElementById('f-badge1').value,
    badge2:    document.getElementById('f-badge2').value,
    host:      document.getElementById('f-host').value,
    hostexp:   document.getElementById('f-hostexp').value,
    lucky:     document.getElementById('f-lucky').value,
    priceOld:  document.getElementById('f-price-old').value,
    priceNew:  document.getElementById('f-price-new').value,
    checkin:   document.getElementById('f-checkin').value,
    checkout:  document.getElementById('f-checkout').value,
    guestbook: document.getElementById('f-guestbook').value,
    photos:    photos.slice()
  };

  const win = window.open('', '_blank', 'width=1100,height=820,scrollbars=yes');
  win.document.write(buildCardHTML(data));
  win.document.close();
}

function buildCardHTML(d) {
  const ratingNum = parseFloat(d.rating.replace(',','.'));
  const stars = Math.round(ratingNum);
  const starsHTML = '★'.repeat(stars) + '☆'.repeat(5-stars);

  function photoCell(idx, extraStyle='') {
    if (d.photos[idx]) {
      return `<div style="overflow:hidden;${extraStyle}"><img src="${d.photos[idx]}" style="width:100%;height:100%;object-fit:cover;display:block;"></div>`;
    }
    return `<div style="background:linear-gradient(135deg,#e8e8e8,#d0d0d0);display:flex;align-items:center;justify-content:center;font-size:2rem;${extraStyle}">📷</div>`;
  }

  return `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tarjeta Airbnb</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Plus Jakarta Sans',sans-serif; background:#f5f5f5; display:flex; flex-direction:column; align-items:center; padding:20px; gap:16px; }
  .dl-bar { background:white; border-radius:10px; padding:12px 20px; display:flex; align-items:center; gap:14px; box-shadow:0 2px 8px rgba(0,0,0,.1); width:1040px; }
  .dl-bar span { font-size:.88rem; color:#555; flex:1; }
  .dl-btn { background:#FF385C; color:white; border:none; border-radius:8px; padding:10px 22px; font-size:.9rem; font-weight:700; font-family:inherit; cursor:pointer; transition:background .2s; }
  .dl-btn:hover { background:#e0284f; }
  .dl-btn:disabled { opacity:.6; cursor:default; }

  /* =====================
     TARJETA AIRBNB EXACTA
     1040 × 680 px
     ===================== */
  #ab-card {
    width: 1040px;
    background: white;
    padding: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: #222;
  }

  /* Título */
  .ab-title-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 24px 12px;
  }
  .ab-title {
    font-size: 1.55rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .ab-title-actions {
    display: flex; gap: 18px; font-size: .9rem; flex-shrink:0;
  }
  .ab-title-actions span {
    display:flex; align-items:center; gap:5px;
    text-decoration:underline; cursor:pointer; font-weight:500;
  }

  /* Mosaico de fotos: ocupa TODO el ancho */
  .ab-mosaic {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 220px 220px;
    gap: 4px;
    margin-bottom: 0;
    position: relative;
  }
  .ab-mosaic-main {
    grid-column: 1;
    grid-row: 1 / 3;
    overflow: hidden;
  }
  .ab-mosaic-main img {
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .ab-mosaic-main .ab-photo-ph {
    width:100%; height:100%;
    background:linear-gradient(135deg,#e8e8e8,#d0d0d0);
    display:flex; align-items:center; justify-content:center; font-size:3rem;
  }
  .ab-mosaic-cell { overflow:hidden; }
  .ab-mosaic-cell img { width:100%; height:100%; object-fit:cover; display:block; }
  .ab-mosaic-cell .ab-photo-ph {
    width:100%; height:100%;
    background:linear-gradient(135deg,#e8e8e8,#d0d0d0);
    display:flex; align-items:center; justify-content:center; font-size:2rem;
  }
  .ab-show-all {
    position:absolute; bottom:12px; right:12px;
    background:white; border:1.5px solid #222; border-radius:8px;
    padding:7px 14px; font-size:.82rem; font-weight:600;
    display:flex; align-items:center; gap:6px;
  }

  /* Cuerpo inferior: info izq + booking der */
  .ab-body {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    padding: 20px 24px 22px;
    align-items: start;
  }

  /* Info izquierda */
  .ab-info { padding-right: 30px; border-right: 1px solid #DDDDDD; }
  .ab-info-type    { font-size: 1.05rem; font-weight: 700; margin-bottom: 3px; }
  .ab-info-details { font-size: .88rem; color: #717171; margin-bottom: 16px; }

  /* Badge box */
  .ab-badge {
    border: 1px solid #DDDDDD;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .ab-badge-icon { font-size: 1.3rem; flex-shrink:0; }
  .ab-badge-label { font-size: .82rem; font-weight: 600; line-height: 1.3; flex:1; }
  .ab-badge-sep   { width:1px; height:36px; background:#DDDDDD; flex-shrink:0; }
  .ab-badge-rating { text-align:center; flex-shrink:0; }
  .ab-badge-rating .sc { font-size: 1rem; font-weight: 700; }
  .ab-badge-rating .st { color: #FF385C; font-size: .78rem; }
  .ab-badge-reviews { text-align:center; flex-shrink:0; }
  .ab-badge-reviews .cnt { font-size: 1rem; font-weight: 700; }
  .ab-badge-reviews .lbl { font-size: .73rem; color: #717171; }

  /* Host */
  .ab-host-row { display:flex; align-items:center; gap:12px; margin-top:4px; }
  .ab-avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#f7a1b0,#ff6b8a); display:flex; align-items:center; justify-content:center; font-size:1rem; color:white; font-weight:700; overflow:hidden; flex-shrink:0; }
  .ab-avatar img { width:100%; height:100%; object-fit:cover; }
  .ab-host-name { font-weight:600; font-size:.93rem; }
  .ab-host-exp  { color:#717171; font-size:.8rem; margin-top:1px; }

  /* Booking derecha */
  .ab-booking { padding-left: 26px; }
  .ab-lucky {
    background: white;
    border: 1px solid #DDDDDD;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: .82rem;
    color: #222;
    margin-bottom: 16px;
    display: flex; align-items: flex-start; gap: 8px;
    box-shadow: 0 1px 6px rgba(0,0,0,.06);
  }
  .ab-lucky .diamond { color: #FF385C; font-size: 1rem; flex-shrink:0; margin-top:1px; }
  .ab-price-line { display:flex; align-items:baseline; gap:10px; margin-bottom:14px; }
  .ab-price-old  { text-decoration:line-through; color:#717171; font-size:1rem; }
  .ab-price-new  { font-size:1.3rem; font-weight:700; text-decoration:underline; }
  .ab-dates      { border:1.5px solid #222; border-radius:10px; overflow:hidden; margin-bottom:8px; }
  .ab-dates-row  { display:grid; grid-template-columns:1fr 1fr; }
  .ab-date-cell  { padding:9px 14px; border-right:1px solid #DDDDDD; }
  .ab-date-cell:last-child { border-right:none; }
  .ab-date-label { font-size:.65rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; }
  .ab-date-val   { font-size:.9rem; margin-top:2px; }
  .ab-guests-row { border:1.5px solid #DDDDDD; border-radius:10px; padding:9px 14px; display:flex; justify-content:space-between; align-items:center; }
  .ab-guests-label { font-size:.65rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; }
  .ab-guests-val   { font-size:.9rem; margin-top:2px; }
</style>
</head>
<body>

<div class="dl-bar">
  <span>✅ Tarjeta lista — 14×10 cm a 300 DPI (1654×1181 px)</span>
  <button class="dl-btn" id="dl-btn" onclick="doDownload()">⬇️ Descargar PNG</button>
</div>

<div id="ab-card">

  <!-- Título -->
  <div class="ab-title-bar">
    <div class="ab-title">${escHTML(d.title)}</div>
    <div class="ab-title-actions">

  </div>

  <!-- Mosaico fotos -->
  <div class="ab-mosaic">

    ${[1,2,3,4].map(i => d.photos[i]

      : `<div class="ab-mosaic-cell"><div class="ab-photo-ph">📷</div></div>`
    ).join('')}
    <div class="ab-show-all">⊞ Mostrar todas las fotos</div>
  </div>

  <!-- Cuerpo -->
  <div class="ab-body">

    <!-- Info izq -->
    <div class="ab-info">
      <div class="ab-info-type">${escHTML(d.type)}</div>
      <div class="ab-info-details">${d.guests} viajeros · ${d.beds} dormitorio${d.beds!=1?'s':''} · ${d.baths} baño${d.baths!=1?'s':''}</div>

      <div class="ab-badge">
        <div class="ab-badge-icon">🏆</div>
        <div class="ab-badge-label">${escHTML(d.badge1)}</div>
        <div class="ab-badge-sep"></div>
        <div>
          <div style="font-size:.78rem;color:#717171;line-height:1.3;max-width:130px;">${escHTML(d.badge2)}</div>

        <div class="ab-badge-rating">
          <div class="sc">${escHTML(d.rating)}</div>
          <div class="st">${starsHTML}</div>
        </div>
        <div class="ab-badge-sep"></div>
        <div class="ab-badge-reviews">
          <div class="cnt">${escHTML(d.reviews)}</div>
          <div class="lbl">evaluaciones</div>
        </div>
      </div>

      <div class="ab-host-row">
        <div class="ab-avatar">${escHTML(d.host.charAt(0).toUpperCase())}</div>
        <div>
          <div class="ab-host-name">Anfitrión: ${escHTML(d.host)}</div>
          <div class="ab-host-exp">${escHTML(d.hostexp)}</div>
        </div>

    <!-- Booking der -->
    <div class="ab-booking">
      <div class="ab-lucky">
        <span class="diamond">♦</span>
        <span>${escHTML(d.lucky)}</span>
      </div>

  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script>
<script>
async function doDownload() {
  const btn = document.getElementById('dl-btn');
  btn.textContent = '⏳ Generando...'; btn.disabled = true;
  try {
    const card = document.getElementById('ab-card');
    const W = card.offsetWidth, H = card.offsetHeight;
    const raw = await html2canvas(card, {
      scale: 2, useCORS: true, allowTaint: true,
      backgroundColor: '#ffffff', logging: false,
      width: W, height: H, windowWidth: W, windowHeight: H, x:0, y:0
    });
    const TW=1654, TH=1181;
    const fs = Math.min(TW/raw.width, TH/raw.height);
    const dW=Math.round(raw.width*fs), dH=Math.round(raw.height*fs);
    const oX=Math.round((TW-dW)/2), oY=Math.round((TH-dH)/2);
    const fc = document.createElement('canvas');
    fc.width=TW; fc.height=TH;
    const ctx=fc.getContext('2d');
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,TW,TH);
    ctx.drawImage(raw,oX,oY,dW,dH);
    const a=document.createElement('a');
    a.download='airbnb-card-14x10cm.png';
    a.href=fc.toDataURL('image/png'); a.click();
  } catch(e) { alert('Error: '+e.message); }
  finally { btn.textContent='⬇️ Descargar PNG'; btn.disabled=false; }
}
<\/script>
</body>
</html>`;
}

function escHTML(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
